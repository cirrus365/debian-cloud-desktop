- name: Setup Debian VPS as remote desktop
  hosts: local
  become: yes
  become_method: sudo
  gather_facts: yes
  vars_files:
    - vars.yml
  vars:
    vnc_service_name: "vncserver-{{ username }}"
  tasks:
    - name: Check OS compatibility (Debian 12+)
      assert:
        that:
          - ansible_facts['distribution'] == "Debian" and ansible_facts['distribution_version'] is version('12', '>=')
        fail_msg: "Unsupported OS. Only Debian 12+ (Stable) is supported."

    - name: Check if {{ username }} user exists
      command: id -u {{ username }}
      register: user_check
      changed_when: false
      failed_when: false

    - name: Create {{ username }} user
      user:
        name: "{{ username }}"
        password: "{{ user_password | password_hash('sha512') }}"
        groups: sudo
        append: yes
        shell: /bin/bash
        create_home: yes
      when: user_check.rc != 0

    - name: Install sudo (required for visudo and privilege escalation)
      apt:
        name: sudo
        state: present
        update_cache: yes

    - name: Ensure /etc/sudoers.d exists
      file:
        path: /etc/sudoers.d
        state: directory
        mode: 0755

    - name: Configure passwordless sudo for {{ username }}
      copy:
        content: "{{ username }} ALL=(ALL) NOPASSWD: ALL"
        dest: /etc/sudoers.d/{{ username }}
        mode: 0440
        validate: /usr/sbin/visudo -cf %s

    - name: Create .ssh directory for {{ username }}
      file:
        path: /home/{{ username }}/.ssh
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0700

    - name: Check if root has SSH authorized_keys
      stat:
        path: /root/.ssh/authorized_keys
      register: root_ssh_keys

    - name: Copy SSH keys from root to {{ username }}
      copy:
        src: /root/.ssh/authorized_keys
        dest: /home/{{ username }}/.ssh/authorized_keys
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0600
        remote_src: yes
      when: root_ssh_keys.stat.exists and root_ssh_keys.stat.size > 0

    - name: Get UID of {{ username }}
      command: id -u {{ username }}
      register: user_uid_result
      changed_when: false

    - name: Set user_uid fact
      set_fact:
        user_uid: "{{ user_uid_result.stdout }}"

    - name: Install packages for Debian
      apt:
        name:
          - xfce4
          - xfce4-goodies
          - xfce4-whiskermenu-plugin
          - arc-theme
          - papirus-icon-theme
          - xfce4-power-manager
          - thunar-archive-plugin
          - gvfs
          - fonts-noto
          - tigervnc-standalone-server
          - tigervnc-common
          - git
          - python3
          - python3-websockify
          - nginx
          - certbot
          - python3-certbot-nginx
          - ufw
          - dbus-x11
          - firefox-esr
          - fail2ban
          - kleopatra
          - pinentry-qt
        state: present
        update_cache: yes

    - name: Clone noVNC (v1.6.0 stable)
      git:
        repo: https://github.com/novnc/noVNC.git
        dest: /opt/noVNC
        version: v1.6.0

    - name: Create SSL directory for noVNC
      file:
        path: /etc/ssl/novnc
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0755

    - name: Generate self-signed SSL certificate
      shell: |
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -keyout /etc/ssl/novnc/novnc.key \
          -out /etc/ssl/novnc/novnc.crt \
          -subj "/CN={{ ansible_default_ipv4.address }}"
      args:
        creates: /etc/ssl/novnc/novnc.crt

    - name: Set SSL cert permissions
      file:
        path: "{{ item }}"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0600
      loop:
        - /etc/ssl/novnc/novnc.crt
        - /etc/ssl/novnc/novnc.key

    - name: Create TigerVNC config directory for {{ username }} (TigerVNC 1.15+)
      file:
        path: /home/{{ username }}/.config/tigervnc
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0700

    - name: Create XDG runtime directory for {{ username }}
      file:
        path: /run/user/{{ user_uid }}
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0700

    - name: Set VNC password for {{ username }}
      shell: |
        printf "%s" "{{ vnc_password }}" | vncpasswd -f > /home/{{ username }}/.config/tigervnc/passwd
      args:
        creates: /home/{{ username }}/.config/tigervnc/passwd
      become: yes
      become_user: "{{ username }}"

    - name: Set VNC password file permissions
      file:
        path: /home/{{ username }}/.config/tigervnc/passwd
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0600

    - name: Create VNC xstartup (XFCE4 + clipboard support)
      copy:
        content: |
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS

          # Start dbus session
          if [ -z "$DBUS_SESSION_BUS_ADDRESS" ]; then
              eval `dbus-launch --sh-syntax`
              export DBUS_SESSION_BUS_ADDRESS
          fi

          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=XFCE
          export XDG_RUNTIME_DIR=/run/user/$(id -u)

          [ -r ~/.Xresources ] && xrdb ~/.Xresources

          exec startxfce4
        dest: /home/{{ username }}/.config/tigervnc/xstartup
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0755

    - name: Remove old .vnc directory (prevents TigerVNC 1.15 migration error)
      file:
        path: /home/{{ username }}/.vnc
        state: absent

    - name: Create VNC systemd service
      copy:
        content: |
          [Unit]
          Description=Remote desktop service (VNC) for {{ username }}
          After=syslog.target network.target

          [Service]
          Type=simple
          User={{ username }}
          Group={{ username }}
          WorkingDirectory=/home/{{ username }}
          ExecStartPre=-/usr/bin/vncserver -kill :{{ vnc_display_num }}
          ExecStart=/usr/bin/vncserver -fg :{{ vnc_display_num }} -geometry {{ vnc_resolution }} -depth 24 -UseBlacklist=0
          ExecStop=/usr/bin/vncserver -kill :{{ vnc_display_num }}

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/{{ vnc_service_name }}.service
        mode: 0644

    - name: Create noVNC (websockify) systemd service
      copy:
        content: |
          [Unit]
          Description=noVNC Websockify Service
          After=network.target {{ vnc_service_name }}.service
          Wants={{ vnc_service_name }}.service

          [Service]
          Type=simple
          User={{ username }}
          Group={{ username }}
          ExecStart=/usr/bin/websockify 127.0.0.1:{{ novnc_port }} localhost:590{{ vnc_display_num }}
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/novnc.service
        mode: 0644

    - name: Check if authorized_keys exists and is non-empty
      stat:
        path: /home/{{ username }}/.ssh/authorized_keys
      register: authorized_keys_stat

    - name: Harden SSH configuration
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        validate: /usr/sbin/sshd -t -f %s
      loop:
        - { regexp: '^PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
      when: >
        item.regexp != '^PasswordAuthentication'
        or (authorized_keys_stat.stat.exists and authorized_keys_stat.stat.size > 0)

    - name: Restart SSH service
      service:
        name: ssh
        state: restarted
        enabled: yes

    - name: Reload systemd daemon
      command: systemctl daemon-reload
      changed_when: false

    - name: Set system timezone
      timezone:
        name: "{{ timezone }}"
      when: timezone is defined and timezone | length > 0

    - name: Start and enable VNC service
      service:
        name: "{{ vnc_service_name }}"
        state: started
        enabled: yes

    - name: Start and enable noVNC service
      service:
        name: novnc
        state: started
        enabled: yes

    - name: Configure nginx reverse proxy for noVNC
      block:
        - name: Create webroot directory for ACME challenge
          file:
            path: /var/www/html
            state: directory
            mode: 0755

        - name: Set SSL certificate facts
          set_fact:
            ssl_cert_path: /etc/ssl/novnc/novnc.crt
            ssl_key_path: /etc/ssl/novnc/novnc.key

        - name: Create nginx site for noVNC (self-signed)
          copy:
            content: |
              limit_req_zone $binary_remote_addr zone=novnc:10m rate=5r/m;

              server {
                  listen {{ nginx_ssl_port }} ssl;
                  server_name {{ domain | default('_') }};

                  ssl_certificate {{ ssl_cert_path }};
                  ssl_certificate_key {{ ssl_key_path }};

                  root /opt/noVNC;
                  index vnc.html;

                  location /websockify {
                      limit_req zone=novnc burst=10 nodelay;
                      proxy_pass http://127.0.0.1:{{ novnc_port }};
                      proxy_http_version 1.1;
                      proxy_set_header Upgrade $http_upgrade;
                      proxy_set_header Connection "upgrade";
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Real-IP $remote_addr;
                  }

                  location / {
                      try_files $uri $uri/ =404;
                  }
              }

              server {
                  listen 80;
                  server_name {{ domain | default('_') }};

                  location /.well-known/acme-challenge/ {
                      root /var/www/html;
                  }

                  location / {
                      return 301 https://$server_name$request_uri;
                  }
              }
            dest: /etc/nginx/sites-available/novnc
            mode: 0644

        - name: Enable noVNC nginx site
          file:
            src: /etc/nginx/sites-available/novnc
            dest: /etc/nginx/sites-enabled/novnc
            state: link

        - name: Remove default nginx site
          file:
            path: /etc/nginx/sites-enabled/default
            state: absent

        - name: Obtain Let's Encrypt certificate (if domain is set)
          when: domain is defined and domain | length > 0
          block:
            - name: Run certbot to get certificate
              shell: |
                {% if letsencrypt_email is defined and letsencrypt_email | length > 0 %}
                certbot certonly --webroot -w /var/www/html -d {{ domain }} \
                  --non-interactive --agree-tos -m {{ letsencrypt_email }}
                {% else %}
                certbot certonly --webroot -w /var/www/html -d {{ domain }} \
                  --non-interactive --agree-tos --register-unsafely-without-email
                {% endif %}
              args:
                creates: /etc/letsencrypt/live/{{ domain }}/fullchain.pem

            - name: Update SSL cert paths to Let's Encrypt
              set_fact:
                ssl_cert_path: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
                ssl_key_path: /etc/letsencrypt/live/{{ domain }}/privkey.pem

            - name: Regenerate nginx site with Let's Encrypt cert
              copy:
                content: |
                  limit_req_zone $binary_remote_addr zone=novnc:10m rate=5r/m;

                  server {
                      listen {{ nginx_ssl_port }} ssl;
                      server_name {{ domain }};

                      ssl_certificate {{ ssl_cert_path }};
                      ssl_certificate_key {{ ssl_key_path }};

                      root /opt/noVNC;
                      index vnc.html;

                      location /websockify {
                          limit_req zone=novnc burst=10 nodelay;
                          proxy_pass http://127.0.0.1:{{ novnc_port }};
                          proxy_http_version 1.1;
                          proxy_set_header Upgrade $http_upgrade;
                          proxy_set_header Connection "upgrade";
                          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                          proxy_set_header X-Real-IP $remote_addr;
                      }

                      location / {
                          try_files $uri $uri/ =404;
                      }
                  }

                  server {
                      listen 80;
                      server_name {{ domain }};

                      location /.well-known/acme-challenge/ {
                          root /var/www/html;
                      }

                      location / {
                          return 301 https://$server_name$request_uri;
                      }
                  }
                dest: /etc/nginx/sites-available/novnc
                mode: 0644

            - name: Enable certbot auto-renewal timer
              systemd:
                name: certbot.timer
                state: started
                enabled: yes

        - name: Reload nginx to apply configuration
          service:
            name: nginx
            state: reloaded

        - name: Restart VNC and noVNC to apply new configs
          service:
            name: "{{ item }}"
            state: restarted
          loop:
            - "{{ vnc_service_name }}"
            - novnc

    - name: Configure firewall (ufw)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "{{ nginx_ssl_port }}"
        - "80"

    - name: Enable ufw
      ufw:
        state: enabled

    - name: Configure fail2ban for noVNC protection via nginx logs
      block:
        - name: Create fail2ban filter for noVNC connections
          copy:
            content: |
              [Definition]
              failregex = ^<HOST> - - \[.*\] "GET /websockify.*" 101
              ignoreregex =
            dest: /etc/fail2ban/filter.d/novnc.conf
            mode: 0644

        - name: Remove old VNC filter and jail (deprecated)
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /etc/fail2ban/filter.d/vnc.conf
            - /etc/fail2ban/jail.d/vnc.conf
          ignore_errors: yes

        - name: Configure fail2ban jail for noVNC
          copy:
            content: |
              [novnc]
              enabled = true
              filter = novnc
              port = https
              logpath = /var/log/nginx/access.log
              backend = auto
              maxretry = 5
              bantime = 3600
              findtime = 600
            dest: /etc/fail2ban/jail.d/novnc.conf
            mode: 0644

        - name: Create fail2ban systemd override directory
          file:
            path: /etc/systemd/system/fail2ban.service.d
            state: directory
            mode: 0755

        - name: Create fail2ban systemd override
          copy:
            content: |
              [Unit]
              PartOf=
              After=network.target

              [Service]
              Restart=always
              RestartSec=5
            dest: /etc/systemd/system/fail2ban.service.d/override.conf
            mode: 0644

        - name: Reload systemd after override
          command: systemctl daemon-reload
          changed_when: false

        - name: Restart fail2ban to apply new jail config
          service:
            name: fail2ban
            state: restarted
            enabled: yes

    - name: Hold grub-pc (VPS don't need it, prevents upgrade hangs)
      shell: |
        dpkg -l grub-pc 2>/dev/null | grep -q "^ii\|^iF" && apt-mark hold grub-pc || true
      changed_when: false
      failed_when: false

    - name: Run system updates (noninteractive)
      shell: |
        DEBIAN_FRONTEND=noninteractive apt-get dist-upgrade -y \
          -o Dpkg::Options::="--force-confold" \
          -o Dpkg::Options::="--force-confdef" 2>&1 | \
          grep -v "debconf: unable" || true
      args:
        executable: /bin/bash
      register: apt_upgrade
      changed_when: "'upgraded' in apt_upgrade.stdout"
      failed_when: false
      timeout: 300
