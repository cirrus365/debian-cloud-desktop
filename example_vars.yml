# Sensitive values - encrypt this file with: ansible-vault create vars.yml
# After editing, encrypt with: ansible-vault encrypt vars.yml

# Configurable non-root user (will be created by playbook)
username: your_username_here

# Sensitive (replace with actual values)
user_password: "your-user-plaintext-password"
vnc_password: "vnc-password"

# Non-sensitive configuration
novnc_port: 6080
vnc_display_num: 1
vnc_resolution: "1280x720"
nginx_ssl_port: 443

# Optional: Set a domain for Let's Encrypt cert (self-signed used otherwise)
# domain: "vnc.example.com"
# letsencrypt_email: ""
